<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Content Approval System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 30px;
}
h1 { text-align: center; color: #1f3c88; }
.container { max-width: 1100px; margin: auto; }
.top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.add-post-btn { background: #2c3e50; color: white; }
.clear-btn { background: #e74c3c; color: white; }
.post-card { background: #ffffff; border-radius: 12px; padding: 20px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
.status { font-weight: bold; margin-bottom: 10px; }
.status.Pending { color: #f39c12; }
.status.Approved { color: #2ecc71; }
.status['Needs Revision'] { color: #e74c3c; }
.preview { width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; margin-top: 10px; }
textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; resize: vertical; }
.caption-box { height: 100px; }
.comment-box { height: 80px; }
.actions { margin-top: 15px; display: flex; gap: 10px; }
.approve-btn { background: #1f3c88; color: white; }
.revision-btn { background: #e67e22; color: white; }
</style>
</head>

<body>
<div class="container">
<h1>Client Content Approval Dashboard</h1>
<div class="top-bar">
    <button class="add-post-btn" onclick="addPost()">+ Add New Post</button>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>
<div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const postsCollection = collection(db, "posts");

const postsDiv = document.getElementById("posts");

// Render a post card
function renderPost(id, data) {
    const card = document.createElement("div");
    card.className = "post-card";

    card.innerHTML = `
        <div class="status ${data.status}">Status: ${data.status}</div>
        <label><strong>Upload Content:</strong></label>
        <input type="file" accept="image/*,video/*" onchange="previewFile(event, '${id}')">
        ${data.fileData ? (data.fileType.startsWith("image") 
            ? `<img src="${data.fileData}" class="preview">` 
            : `<video src="${data.fileData}" controls class="preview"></video>`) : ""}
        <label><strong>Caption:</strong></label>
        <textarea class="caption-box" placeholder="Write caption...">${data.caption || ""}</textarea>
        <label><strong>Client Comments:</strong></label>
        <textarea class="comment-box" placeholder="Client comments...">${data.comment || ""}</textarea>
        <div class="actions">
            <button class="approve-btn">Approve</button>
            <button class="revision-btn">Needs Revision</button>
        </div>
    `;

    const caption = card.querySelector(".caption-box");
    const comment = card.querySelector(".comment-box");
    const approveBtn = card.querySelector(".approve-btn");
    const revisionBtn = card.querySelector(".revision-btn");

    caption.onchange = () => updateDoc(doc(db, "posts", id), { caption: caption.value });
    comment.onchange = () => updateDoc(doc(db, "posts", id), { comment: comment.value });
    approveBtn.onclick = () => updateDoc(doc(db, "posts", id), { status: "Approved" });
    revisionBtn.onclick = () => updateDoc(doc(db, "posts", id), { status: "Needs Revision" });

    postsDiv.appendChild(card);
}

// Real-time listener for Firestore
onSnapshot(postsCollection, snapshot => {
    postsDiv.innerHTML = "";
    snapshot.forEach(docSnap => {
        renderPost(docSnap.id, docSnap.data());
    });
});

// Add new post
async function addPost() {
    await addDoc(postsCollection, {
        caption: "",
        comment: "",
        fileData: "",
        fileType: "",
        status: "Pending",
        timestamp: Date.now()
    });
}

// Preview file upload
function previewFile(event, id) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        updateDoc(doc(db, "posts", id), { fileData: e.target.result, fileType: file.type });
    };
    reader.readAsDataURL(file);
}

// Clear all posts
async function clearAll() {
    if(confirm("Are you sure you want to delete all posts?")) {
        const snapshot = await postsCollection.get();
        snapshot.forEach(docSnap => deleteDoc(doc(db, "posts", docSnap.id)));
    }
}
</script>
</body>
</html>
