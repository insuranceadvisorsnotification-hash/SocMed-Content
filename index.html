<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Content Approval System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 30px;
}

h1 {
    text-align: center;
    color: #1f3c88;
}

.container {
    max-width: 1100px;
    margin: auto;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.add-post-btn {
    background: #2c3e50;
    color: white;
}

.clear-btn {
    background: #e74c3c;
    color: white;
}

.post-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.status {
    font-weight: bold;
    margin-bottom: 10px;
}

.status.pending { color: #f39c12; }
.status.approved { color: #2ecc71; }
.status.revision { color: #e74c3c; }

.preview {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    border-radius: 10px;
    margin-top: 10px;
}

textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: vertical;
}

.caption-box { height: 100px; }
.comment-box { height: 80px; }

.actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.approve-btn { background: #1f3c88; color: white; }
.revision-btn { background: #e67e22; color: white; }
</style>
</head>

<body>

<div class="container">
<h1>Client Content Approval Dashboard</h1>

<div class="top-bar">
    <button class="add-post-btn" onclick="addPost()">+ Add New Post</button>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<div id="posts"></div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("clientPosts")) || [];

function saveToStorage() {
    localStorage.setItem("clientPosts", JSON.stringify(posts));
}

function addPost() {
    const newPost = {
        id: Date.now(),
        caption: "",
        comment: "",
        fileData: "",
        fileType: "",
        status: "Pending"
    };
    posts.push(newPost);
    saveToStorage();
    renderPosts();
}

function updatePost(id, field, value) {
    const post = posts.find(p => p.id === id);
    post[field] = value;
    saveToStorage();
}

function setStatus(id, status) {
    const post = posts.find(p => p.id === id);
    post.status = status;
    saveToStorage();
    renderPosts();
}

function previewFile(event, id) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const post = posts.find(p => p.id === id);
        post.fileData = e.target.result;
        post.fileType = file.type;
        saveToStorage();
        renderPosts();
    };
    reader.readAsDataURL(file);
}

function clearAll() {
    if(confirm("Are you sure you want to delete all posts?")) {
        posts = [];
        saveToStorage();
        renderPosts();
    }
}

function renderPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    posts.forEach(post => {

        const card = document.createElement("div");
        card.className = "post-card";

        let statusClass = post.status.toLowerCase().replace(" ", "");

        card.innerHTML = `
            <div class="status ${statusClass}">
                Status: ${post.status}
            </div>

            <label><strong>Upload Content:</strong></label>
            <input type="file" accept="image/*,video/*" onchange="previewFile(event, ${post.id})">

            ${post.fileData ? 
                (post.fileType.startsWith("image") 
                    ? `<img src="${post.fileData}" class="preview">`
                    : `<video src="${post.fileData}" controls class="preview"></video>`)
                : ""}

            <label><strong>Caption:</strong></label>
            <textarea class="caption-box"
                oninput="updatePost(${post.id}, 'caption', this.value)"
                placeholder="Write caption...">${post.caption}</textarea>

            <label><strong>Client Comments:</strong></label>
            <textarea class="comment-box"
                oninput="updatePost(${post.id}, 'comment', this.value)"
                placeholder="Client comments...">${post.comment}</textarea>

            <div class="actions">
                <button class="approve-btn" onclick="setStatus(${post.id}, 'Approved')">Approve</button>
                <button class="revision-btn" onclick="setStatus(${post.id}, 'Needs Revision')">Needs Revision</button>
            </div>
        `;

        container.appendChild(card);
    });
}

renderPosts();

</script>

</body>
</html>
